services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      PORT: "80"
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/mysite
      CLIENT_URL: ${CLIENT_URL:-https://ronencohen.dev}
    env_file:
      - .env
    depends_on:
      - mongo

volumes:
  mongo_data:
